{% set version = "0.2.0" %}

package:
  name: pytest-mypy-testing
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest-mypy-testing/pytest_mypy_testing-{{ version }}.tar.gz
  sha256: ad56d3d0a806c4a38b5a65cbbf5ae569139565c50b4c1ff3da95a1a17d27a8ab

build:
  number: 0
  noarch: python
  script:
    # uses some strange, old fork of flit, but still has old school `setup.py`
    - {{ PYTHON }} -c "__import__('pathlib').Path('pyproject.toml').unlink()"
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - mypy >=1.0
    - pytest >=7,<9
    - python >={{ python_min }}

test:
  source_files:
    - tests
    - mypy_tests
  imports:
    - pytest_mypy_testing
  commands:
    - pip check
    # $PREFIX/lib/python3.9/site-packages/pytest_mypy_testing/parser.py:147: error: "AST" has no attribute "lineno"  [attr-defined]
    # - mypy -p pytest_mypy_testing
    - coverage run --source=pytest_mypy_testing -m pytest tests mypy_tests --doctest-modules -p no:mypy-testing -k "not test_iter_comments"
    - coverage report --show-missing --skip-covered --fail-under=97
  requires:
    - coverage
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/davidfritzsche/pytest-mypy-testing
  summary: Pytest plugin to check mypy output.
  license: Apache-2.0
  license_file:
    - LICENSES/MIT.txt
    - LICENSES/CC0-1.0.txt
    - LICENSES/Apache-2.0.txt

extra:
  recipe-maintainers:
    - bollwyvl
