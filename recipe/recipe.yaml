# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.0"
  python_check_max: "3.14"

package:
  name: pytest-mypy-testing
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest-mypy-testing/pytest_mypy_testing-${{ version }}.tar.gz
  sha256: ad56d3d0a806c4a38b5a65cbbf5ae569139565c50b4c1ff3da95a1a17d27a8ab

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - flit-core >=3.12,<4
  run:
    - mypy >=1.0
    - pytest >=8
    - python >=${{ python_min }}

tests:
  - python:
      imports: pytest_mypy_testing
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      source:
        - tests/
        - mypy_tests/
    requirements:
      run:
        - coverage
        - python ${{ python_min }}.*
    script:
      - coverage run --source=pytest_mypy_testing -m pytest tests mypy_tests --doctest-modules -p no:mypy-testing -k "not test_iter_comments"
      - coverage report --show-missing --skip-covered --fail-under=97

about:
  summary: Pytest plugin to check mypy output.
  license: Apache-2.0
  license_file:
    - LICENSES/MIT.txt
    - LICENSES/CC0-1.0.txt
    - LICENSES/Apache-2.0.txt
  homepage: https://pypi.org/project/pytest-mypy-testing
  repository: https://github.com/davidfritzsche/pytest-mypy-testing

extra:
  recipe-maintainers:
    - bollwyvl
